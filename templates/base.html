<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Sidharth Punathil{% endblock title %}</title>
  <meta name="description" content="{% block description %}Sidharth Punathil — software engineer, builder, and cofounder at Cofount.{% endblock description %}">
  <link rel="canonical" href="{% block canonical %}{{ current_url | default(value=config.base_url) }}{% endblock canonical %}">
  <meta property="og:title" content="{% block og_title %}Sidharth Punathil{% endblock og_title %}">
  <meta property="og:description" content="{% block og_description %}Sidharth Punathil — software engineer, builder, and cofounder at Cofount.{% endblock og_description %}">
  <meta property="og:type" content="{% block og_type %}website{% endblock og_type %}">
  <meta property="og:url" content="{{ current_url | default(value=config.base_url) }}">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="{% block twitter_title %}Sidharth Punathil{% endblock twitter_title %}">
  <meta name="twitter:description" content="{% block twitter_description %}Sidharth Punathil — software engineer, builder, and cofounder at Cofount.{% endblock twitter_description %}">
  <link rel="icon" type="image/gif" href="/favicon.gif" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'system-ui', 'sans-serif'],
          }
        }
      }
    }
  </script>
  <style type="text/tailwindcss">
    @layer base {
      ::selection {
        background-color: #1d1d1f;
        color: #fff;
      }
      a { @apply transition-colors duration-200; }
    }
  </style>
</head>

<body class="bg-white text-neutral-900 min-h-screen font-sans antialiased">
  <div class="mx-auto max-w-2xl px-6 min-h-screen flex flex-col border-l border-r border-neutral-100">
    <div class="flex-1">
      {% block content %} {% endblock content %}
    </div>

    <footer class="pb-16 pt-32">
      <div class="border-t border-neutral-200 pt-6 flex justify-between items-center">
        <p class="text-neutral-400 text-xs tracking-wide">made by human. 2026.</p>
        <div class="flex items-center gap-5">
          <a href="mailto:hello@sidharth.co" class="text-neutral-400 text-xs tracking-wide hover:text-neutral-900">mail</a>
          <a href="https://github.com/sidharthpunathil" class="text-neutral-400 text-xs tracking-wide hover:text-neutral-900">github</a>
          <a href="https://www.linkedin.com/in/sidharthpunathil/" class="text-neutral-400 text-xs tracking-wide hover:text-neutral-900">linkedin</a>
          <a href="https://x.com/0xS1dharth" class="text-neutral-400 text-xs tracking-wide hover:text-neutral-900">x</a>
        </div>
      </div>
    </footer>
  </div>
</body>

</html>
